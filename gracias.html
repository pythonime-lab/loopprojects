<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mensaje Enviado - Loop Projects</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css?v=2" />
    <script src="header.js?v=2"></script>
    <script src="footer.js?v=2"></script>
    <style>
      .thanks-wrap {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
        text-align: center;
      }

      .thanks-card {
        max-width: 560px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        padding: 3rem 2.5rem;
      }

      .thanks-icon {
        font-size: 3rem;
        margin-bottom: 1.5rem;
        display: block;
      }

      .thanks-title {
        font-size: 2rem;
        color: var(--primary);
        margin-bottom: 1rem;
        line-height: 1.2;
      }

      .thanks-body {
        font-size: 1rem;
        color: var(--text-muted);
        line-height: 1.7;
        margin-bottom: 2rem;
      }

      .thanks-body strong { color: var(--text-light); }

      .thanks-back {
        display: inline-block;
        padding: 0.85rem 2rem;
        background: var(--primary);
        color: #fff;
        border-radius: 12px;
        text-decoration: none;
        font-family: "Space Mono", monospace;
        font-size: 0.9rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.3s;
        box-shadow: 0 4px 16px rgba(168,85,247,0.3);
      }

      .thanks-back:hover {
        background: #9333ea;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(168,85,247,0.4);
      }

      .thanks-note {
        margin-top: 1.5rem;
        font-size: var(--text-sm);
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <script>document.write(createHeader(false));</script>

    <div class="thanks-wrap">
      <div class="thanks-card">
        <span class="thanks-icon">&#x2714;&#xfe0e;</span>
        <h1 class="thanks-title">Mensaje recibido</h1>
        <p class="thanks-body">
          Gracias por contactar. Revisaré la situación de tu sitio y
          te responderé con una <strong>evaluación inicial gratuita en menos de 48 horas</strong>.
        </p>
        <a href="servicios-seguridad-wordpress.html" class="thanks-back">Volver a servicios</a>
        <p class="thanks-note">Revisa tu carpeta de spam si no recibes respuesta.</p>
      </div>
    </div>

    <script>document.write(createFooter(false));</script>
  </body>
</html>
